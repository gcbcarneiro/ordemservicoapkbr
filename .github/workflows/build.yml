name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ❌ REMOVIDO: instalação manual do Gradle (desnecessário)

      - name: Dar permissão ao gradlew
        run: chmod +x ./gradlew

      # 🔥 Limpa cache do Gradle (evita erro de dependência travada)
      - name: Limpar cache Gradle
        run: rm -rf ~/.gradle/caches

      - name: Credenciais Supabase
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      # ✅ BUILD CORRIGIDO
      - name: Build APK
        run: ./gradlew clean assembleDebug --refresh-dependencies --stacktrace --info
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OrdemServico-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
